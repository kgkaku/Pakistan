name: Mjunoon

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      
      - run: pip install pycryptodome requests
      
      - name: Decode and run script
        env:
          SCRIPT: ${{ secrets.MJUNOON_PY }}
        run: |
          echo "$SCRIPT" | base64 -d > mjunoon.py
          python mjunoon.py
      
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add mjunoon.tv/ -f
          git commit -m "Auto-update playlists [skip ci]" || echo "No changes to commit"
          git push
